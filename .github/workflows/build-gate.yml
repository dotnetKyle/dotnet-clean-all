name: pull-request-gate

on:
  pull_request:
    branches: [ '*' ]

env:
  BUILD_VERSION: 0.0.2.${{github.run_number}}
  SLN_PATH: src/CleanAll.sln

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 #v5.2.0
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: dotnet restore $SLN_PATH

    - name: Build
      run: dotnet build $SLN_PATH 
           -c Release 
           --no-restore 
           -p:Version=$BUILD_VERSION

    - name: Upload ShellRunner Build Artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
      with:
        name: BuildArtifacts
        path: src/CleanAll/bin/Release/**/*
